services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: leadpilot
      POSTGRES_PASSWORD: leadpilot_dev_password
      POSTGRES_DB: leadpilot_dev
    ports:
      - "5432:5432"
    volumes:
      - leadpilot_postgres_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leadpilot -d leadpilot_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - leadpilot_redis_dev:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  leadpilot_postgres_dev:
  leadpilot_redis_dev:
