name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  verify:
    name: Verify monorepo
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: leadpilot
          POSTGRES_PASSWORD: leadpilot_dev_password
          POSTGRES_DB: leadpilot_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U leadpilot -d leadpilot_dev"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://leadpilot:leadpilot_dev_password@localhost:5432/leadpilot_dev?schema=public
      REDIS_URL: redis://localhost:6379
      SESSION_SECRET: ci_session_secret_change_me_32_chars
      AI_PROVIDER: mock
      NEXT_PUBLIC_API_URL: http://localhost:4000

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Apply database migrations
        run: pnpm db:migrate:deploy

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Validate production Compose
        run: |
          cp .env.example .env.production
          docker compose -f docker-compose.prod.yml config

      - name: Build Docker images
        run: |
          docker build -f infra/docker/web.Dockerfile .
          docker build -f infra/docker/api.Dockerfile .
          docker build -f infra/docker/worker.Dockerfile .
